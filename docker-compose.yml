services:
  mysql:
    image: mysql:8.0
    container_name: set_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: set_db
      MYSQL_USER: set_user
      MYSQL_PASSWORD: set_password
    ports:
      - "3306:3306"
    volumes:
      - ./ddl_scripts:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql
      - ./csv_data:/csv_files
    command: --default-authentication-plugin=caching_sha2_password --secure-file-priv=/csv_files
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      timeout: 20s
      retries: 10

  mongodb:
    image: mongo:8.0
    container_name: set_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: rootadmin
      MONGO_INITDB_ROOT_PASSWORD: rootpass
    volumes:
      - mongodb_data:/data/db
      - ./mongo_init:/docker-entrypoint-initdb.d
    ports:
      - "27017:27017"
    restart: unless-stopped

  cassandra:
    image: cassandra:4.1
    container_name: set_cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "set_cluster"
      CASSANDRA_DATACENTER: "set_datacenter"
    ports:
      - "9042:9042"
    volumes:
      - cassandra_data:/var/lib/cassandra
    restart: unless-stopped

  redis:
    image: redis:7.0
    container_name: set_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  api:
    build: .
    container_name: set_api
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: set_db
      MYSQL_USER: set_user
      MYSQL_PASSWORD: set_password

      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./app:/app
    working_dir: /app

volumes:
  mysql_data:
  mongodb_data:
  cassandra_data:
  redis_data: